services:
  postgres-core:
    image: postgres:16
    container_name: parking-postgres-core
    environment:
      POSTGRES_DB: ${POSTGRES_CORE_DB}
      POSTGRES_USER: ${POSTGRES_CORE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CORE_PASSWORD}
    ports:
      - "${POSTGRES_CORE_PORT}:5432"
    volumes:
      - postgres_core_data:/var/lib/postgresql/data
      - ./database/postgres-core:/workspace/postgres-core
      - ./database/postgres-core/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CORE_USER} -d ${POSTGRES_CORE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-biometrics:
    image: pgvector/pgvector:pg16
    container_name: parking-postgres-biometrics
    environment:
      POSTGRES_DB: ${POSTGRES_BIOMETRICS_DB}
      POSTGRES_USER: ${POSTGRES_BIOMETRICS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_BIOMETRICS_PASSWORD}
    ports:
      - "${POSTGRES_BIOMETRICS_PORT}:5432"
    volumes:
      - postgres_biometrics_data:/var/lib/postgresql/data
      - ./database/postgres-biometrics:/workspace/postgres-biometrics
      - ./database/postgres-biometrics/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_BIOMETRICS_USER} -d ${POSTGRES_BIOMETRICS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: parking-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
      - ./storage/minio:/workspace/minio

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: parking-mosquitto
    ports:
      - "${MQTT_PORT}:1883"
      - "${MQTT_WS_PORT}:9001"
    volumes:
      - ./iot/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nodered:
    image: nodered/node-red:latest
    container_name: parking-nodered
    environment:
      FLOWS: flows.json
    ports:
      - "${NODERED_PORT}:1880"
    volumes:
      - nodered_data:/data
      - ./iot/nodered/flows.json:/data/flows.json
    depends_on:
      - mosquitto

  api-gateway:
    build: ./backend/services/api-gateway
    container_name: parking-api-gateway
    env_file: .env
    ports:
      - "${API_GATEWAY_PORT}:8000"
    volumes:
      - ./web/admin-portal:/app/web/admin-portal:ro
    depends_on:
      - auth-service
      - university-service
      - vehicle-service
      - parking-service
      - payment-service
      - face-service
      - plate-service
      - iot-service
      - audit-service

  auth-service:
    build: ./backend/services/auth-service
    container_name: parking-auth-service
    env_file: .env
    ports:
      - "${AUTH_SERVICE_PORT}:8000"

  university-service:
    build: ./backend/services/university-service
    container_name: parking-university-service
    env_file: .env
    ports:
      - "${UNIVERSITY_SERVICE_PORT}:8000"
    depends_on:
      - postgres-core

  vehicle-service:
    build: ./backend/services/vehicle-service
    container_name: parking-vehicle-service
    env_file: .env
    ports:
      - "${VEHICLE_SERVICE_PORT}:8000"
    depends_on:
      - postgres-core

  parking-service:
    build: ./backend/services/parking-service
    container_name: parking-service
    env_file: .env
    ports:
      - "${PARKING_SERVICE_PORT}:8000"
    depends_on:
      - postgres-core

  face-service:
    build: ./backend/services/face-service
    container_name: parking-face-service
    env_file: .env
    ports:
      - "${FACE_SERVICE_PORT}:8000"
    depends_on:
      - postgres-biometrics
      - minio

  plate-service:
    build: ./backend/services/plate-service
    container_name: parking-plate-service
    env_file: .env
    ports:
      - "${PLATE_SERVICE_PORT}:8000"
    depends_on:
      - postgres-biometrics
      - minio

  payment-service:
    build: ./backend/services/payment-service
    container_name: parking-payment-service
    env_file: .env
    ports:
      - "${PAYMENT_SERVICE_PORT}:8000"
    depends_on:
      - postgres-core

  iot-service:
    build: ./backend/services/iot-service
    container_name: parking-iot-service
    env_file: .env
    ports:
      - "${IOT_SERVICE_PORT}:8000"
    depends_on:
      - mosquitto

  audit-service:
    build: ./backend/services/audit-service
    container_name: parking-audit-service
    env_file: .env
    ports:
      - "${AUDIT_SERVICE_PORT}:8000"
    depends_on:
      - postgres-core

volumes:
  postgres_core_data:
  postgres_biometrics_data:
  minio_data:
  nodered_data:
