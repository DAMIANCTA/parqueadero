openapi: 3.0.3
info:
  title: Auth Service
  version: 0.1.0
paths:
  /auth/token:
    post:
      summary: Issue signed access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Token issued
  /auth/me:
    get:
      summary: Return current authenticated user
      responses:
        "200":
          description: Current user returned
