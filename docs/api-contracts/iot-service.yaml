openapi: 3.0.3
info:
  title: IoT Service
  version: 0.1.0
paths:
  /api/v1/gates/open:
    post:
      summary: Publish gate open command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [university_id, campus_id, gate_id, plate, reason]
              properties:
                university_id:
                  type: string
                campus_id:
                  type: string
                gate_id:
                  type: string
                reason:
                  type: string
                session_id:
                  type: string
                  nullable: true
                plate:
                  type: string
                command:
                  type: string
                  default: open
      responses:
        "200":
          description: Command published
          content:
            application/json:
              schema:
                type: object
                properties:
                  gate_id:
                    type: string
                  command:
                    type: string
                  published:
                    type: boolean
                  topic:
                    type: string
                  status_topic:
                    type: string
                  payload:
                    type: object
