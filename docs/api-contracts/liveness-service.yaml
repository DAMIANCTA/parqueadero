openapi: 3.0.3
info:
  title: Liveness Service
  version: 0.1.0
paths:
  /faces/liveness-check:
    post:
      summary: Perform liveness validation from MinIO image reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_reference]
              properties:
                university_id:
                  type: string
                  nullable: true
                person_id:
                  type: string
                  nullable: true
                image_reference:
                  $ref: "#/components/schemas/MinioImageReference"
                challenge_type:
                  type: string
                liveness_threshold:
                  type: number
                  format: float
                  nullable: true
      responses:
        "200":
          description: Liveness result returned
components:
  schemas:
    MinioImageReference:
      type: object
      required: [bucket, object_path]
      properties:
        bucket:
          type: string
        object_path:
          type: string
        object_version:
          type: string
          nullable: true
        sha256_hash:
          type: string
          nullable: true
        content_type:
          type: string
        image_type:
          type: string
