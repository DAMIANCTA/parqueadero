openapi: 3.0.3
info:
  title: Plate Recognition Service
  version: 0.2.0
paths:
  /plates/detect:
    post:
      summary: Detect vehicle plate from evidence image
      description: |
        Supports two modes:
        1. JSON request with `image_id` referencing an evidence image already stored in MinIO.
        2. Multipart upload for local/mock testing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image_id]
              properties:
                image_id:
                  type: string
                plate_image_id:
                  type: string
                university_id:
                  type: string
                campus_id:
                  type: string
                gate_id:
                  type: string
                country_code:
                  type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                image_id:
                  type: string
                plate_image_id:
                  type: string
                bucket:
                  type: string
                object_name:
                  type: string
                country_code:
                  type: string
              oneOf:
                - required: [image]
                - required: [image_id]
                - required: [bucket, object_name]
      responses:
        "200":
          description: Plate detection returned
          content:
            application/json:
              schema:
                type: object
                required:
                  - image_id
                  - plate_text
                  - confidence
                  - bounding_box
                  - candidates
                  - status
                  - mode
                  - valid_format
                  - source
                properties:
                  image_id:
                    type: string
                  plate_text:
                    type: string
                  confidence:
                    type: number
                    format: float
                  status:
                    type: string
                    enum: [DETECTED, LOW_CONFIDENCE, NOT_DETECTED]
                  mode:
                    type: string
                    enum: [mock, real]
                  valid_format:
                    type: boolean
                  source:
                    type: string
                    enum: [upload, minio]
                  detector_provider:
                    type: string
                  ocr_provider:
                    type: string
                  bounding_box:
                    type: object
                    properties:
                      x:
                        type: integer
                      y:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                  candidates:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        confidence:
                          type: number
                          format: float
