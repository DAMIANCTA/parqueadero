openapi: 3.0.3
info:
  title: Plate Recognition Service
  version: 0.1.0
paths:
  /plates/detect:
    post:
      summary: Detect vehicle plate from image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                image_id:
                  type: string
                  description: Optional upstream image reference. If omitted for upload mode, the service generates one.
                bucket:
                  type: string
                  description: MinIO bucket name when using object reference mode.
                object_name:
                  type: string
                  description: MinIO object path when using object reference mode.
                country_code:
                  type: string
              oneOf:
                - required: [image]
                - required: [bucket, object_name]
      responses:
        "200":
          description: Plate detection returned
          content:
            application/json:
              schema:
                type: object
                required: [image_id, plate_text, confidence, bounding_box, mode, valid_format, source]
                properties:
                  image_id:
                    type: string
                  plate_text:
                    type: string
                  confidence:
                    type: number
                    format: float
                  mode:
                    type: string
                    enum: [mock, real]
                  valid_format:
                    type: boolean
                  source:
                    type: string
                    enum: [upload, minio]
                  detector_provider:
                    type: string
                  ocr_provider:
                    type: string
                  bounding_box:
                    type: object
                    properties:
                      x:
                        type: integer
                      y:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
