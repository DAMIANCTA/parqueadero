openapi: 3.0.3
info:
  title: Plate Recognition Service
  version: 0.1.0
paths:
  /plates/detect:
    post:
      summary: Detect vehicle plate from image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                country_code:
                  type: string
      responses:
        "200":
          description: Plate detection returned
          content:
            application/json:
              schema:
                type: object
                required: [plate_text, confidence, bounding_box, mode, valid_format]
                properties:
                  plate_text:
                    type: string
                  confidence:
                    type: number
                    format: float
                  mode:
                    type: string
                    enum: [mock, real]
                  valid_format:
                    type: boolean
                  bounding_box:
                    type: object
                    properties:
                      x:
                        type: integer
                      y:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
